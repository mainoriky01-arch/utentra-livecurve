<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utentra - Selezione Ventilatori Industriali</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
        }
        .header { background: rgba(255,255,255,0.05); padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header h1 span { color: #4CAF50; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .control-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        .control-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; }
        select:focus, input:focus { outline: none; border-color: #4CAF50; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .chart-wrapper { position: relative; height: 400px; }
        .data-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .data-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; }
        .data-card .value { font-size: 28px; font-weight: 700; color: #4CAF50; }
        .data-card .label { font-size: 12px; color: #888; margin-top: 5px; }
        .data-card.highlight { background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.5); }
        .info-box { background: rgba(76, 175, 80, 0.1); border: 1px solid rgba(76, 175, 80, 0.3); border-radius: 10px; padding: 15px; margin-top: 20px; }
        .info-box h3 { color: #4CAF50; margin-bottom: 10px; }
        .info-box p { color: #aaa; font-size: 14px; line-height: 1.6; }
        .series-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .stat { background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 5px; font-size: 13px; }
        .stat strong { color: #4CAF50; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="header"><div class="container"><h1><span>Utentra</span> Fan Selector</h1></div></div>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Serie</label>
                <select id="series"><option value="">Caricamento...</option></select>
            </div>
            <div class="control-group">
                <label>Modello</label>
                <select id="model" disabled><option value="">Prima seleziona serie...</option></select>
            </div>
            <div class="control-group">
                <label>Portata (m³/h)</label>
                <input type="number" id="flowRate" placeholder="es. 5000" disabled step="1">
            </div>
            <div class="control-group">
                <label>Risultato</label>
                <div id="result" style="padding:10px;color:#4CAF50;font-size:16px;font-weight:bold;">--</div>
            </div>
        </div>
        <div class="chart-container"><div class="chart-wrapper"><canvas id="curveChart"></canvas></div></div>
        <div class="data-panel">
            <div class="data-card highlight"><div class="value" id="totalPressure">--</div><div class="label">Pressione Totale (kg/m²)</div></div>
            <div class="data-card"><div class="value" id="staticPressure">--</div><div class="label">Pressione Statica (kg/m²)</div></div>
            <div class="data-card"><div class="value" id="flowRange">--</div><div class="label">Range Portata (m³/h)</div></div>
            <div class="data-card"><div class="value" id="pressureRange">--</div><div class="label">Range Pressione (kg/m²)</div></div>
        </div>
        <div class="info-box">
            <h3>📊 Dati Reali Euroventilatori LiveCurve</h3>
            <p>Curve caratteristiche estratte con precisione verificata &lt;0.1% - <span id="modelCount">--</span> modelli</p>
            <div class="series-stats" id="seriesStats"></div>
        </div>
    </div>
<script>
let CURVES = {};
let chart = null;
let currentModel = null;

async function loadData() {
    try {
        const res = await fetch('curves.json');
        CURVES = await res.json();
        populateSeries();
        initChart();
        
        // Stats
        const totalModels = Object.values(CURVES).reduce((a, s) => a + Object.keys(s).length, 0);
        document.getElementById('modelCount').textContent = totalModels;
        
        const statsEl = document.getElementById('seriesStats');
        statsEl.innerHTML = Object.keys(CURVES).map(s => 
            `<div class="stat"><strong>${Object.keys(CURVES[s]).length}</strong> ${s}</div>`
        ).join('');
    } catch(e) {
        console.error('Errore caricamento dati:', e);
        document.getElementById('series').innerHTML = '<option value="">Errore caricamento</option>';
    }
}

function populateSeries() {
    const sel = document.getElementById('series');
    sel.innerHTML = '<option value="">Seleziona serie...</option>';
    Object.keys(CURVES).sort().forEach(s => {
        const count = Object.keys(CURVES[s]).length;
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = `${s} (${count} modelli)`;
        sel.appendChild(opt);
    });
}

function initChart() {
    const ctx = document.getElementById('curveChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                {label: 'Pressione Totale', borderColor: '#4CAF50', backgroundColor: 'rgba(76,175,80,0.1)', showLine: true, tension: 0.3, pointRadius: 0, borderWidth: 2, data: []},
                {label: 'Pressione Statica', borderColor: '#2196F3', backgroundColor: 'rgba(33,150,243,0.1)', showLine: true, tension: 0.3, pointRadius: 0, borderWidth: 2, data: []},
                {label: 'Punto Operativo', borderColor: '#ff5722', backgroundColor: '#ff5722', pointRadius: 10, showLine: false, data: []}
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {legend: {labels: {color: '#fff'}}},
            scales: {
                x: {type: 'linear', title: {display: true, text: 'Portata (m³/h)', color: '#888'}, grid: {color: 'rgba(255,255,255,0.1)'}, ticks: {color: '#888'}},
                y: {type: 'linear', title: {display: true, text: 'Pressione (kg/m²)', color: '#888'}, grid: {color: 'rgba(255,255,255,0.1)'}, ticks: {color: '#888'}}
            }
        }
    });
}

function loadModel(seriesName, modelName) {
    if (!CURVES[seriesName] || !CURVES[seriesName][modelName]) return;
    
    currentModel = CURVES[seriesName][modelName];
    
    // Converti array [flow, pressure] in {x, y}
    const total = currentModel.total.map(p => ({x: p[0], y: p[1]}));
    const stat = currentModel.static.map(p => ({x: p[0], y: p[1]}));
    
    chart.data.datasets[0].data = total;
    chart.data.datasets[1].data = stat;
    chart.data.datasets[2].data = [];
    chart.update();
    
    document.getElementById('flowRate').disabled = false;
    document.getElementById('flowRange').textContent = `${currentModel.fMin}-${currentModel.fMax}`;
    document.getElementById('pressureRange').textContent = `${currentModel.pMin}-${currentModel.pMax}`;
    document.getElementById('totalPressure').textContent = '--';
    document.getElementById('staticPressure').textContent = '--';
    document.getElementById('result').textContent = '--';
}

function interpolate(arr, x) {
    for (let i = 0; i < arr.length - 1; i++) {
        const [x1, y1] = arr[i];
        const [x2, y2] = arr[i + 1];
        if ((x >= x1 && x <= x2) || (x <= x1 && x >= x2)) {
            const t = (x - x1) / (x2 - x1);
            return y1 + t * (y2 - y1);
        }
    }
    return null;
}

document.getElementById('series').addEventListener('change', function() {
    const ms = document.getElementById('model');
    const series = this.value;
    ms.innerHTML = '<option value="">Seleziona modello...</option>';
    document.getElementById('flowRate').disabled = true;
    
    if (series && CURVES[series]) {
        ms.disabled = false;
        Object.keys(CURVES[series]).forEach(m => {
            const o = document.createElement('option');
            o.value = m;
            o.textContent = m;
            ms.appendChild(o);
        });
    } else {
        ms.disabled = true;
    }
});

document.getElementById('model').addEventListener('change', function() {
    const series = document.getElementById('series').value;
    if (this.value && series) loadModel(series, this.value);
});

document.getElementById('flowRate').addEventListener('input', function() {
    const q = parseFloat(this.value);
    if (q && currentModel) {
        const pt = interpolate(currentModel.total, q);
        const ps = interpolate(currentModel.static, q);
        
        if (pt !== null && ps !== null) {
            const pd = pt - ps;
            document.getElementById('totalPressure').textContent = pt.toFixed(1);
            document.getElementById('staticPressure').textContent = ps.toFixed(1);
            document.getElementById('result').textContent = `PT: ${pt.toFixed(1)} | PS: ${ps.toFixed(1)} | Pd: ${pd.toFixed(1)} kg/m²`;
            chart.data.datasets[2].data = [{x: q, y: pt}];
            chart.update();
        } else {
            document.getElementById('result').textContent = 'Fuori range';
            document.getElementById('totalPressure').textContent = '--';
            document.getElementById('staticPressure').textContent = '--';
        }
    }
});

// Carica dati all'avvio
loadData();
</script>
</body>
</html>
